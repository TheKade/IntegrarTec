<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
   <main class="calculator">
    <h1>Calculadora</h1>
        <section class="calculator-panel" aria-label="Calculadora">
            <div class="calculator-display-container">
                <!-- aria-live permite que lectores de pantalla anuncien cambios -->
                <div class="calculator-operation" id="current-operation" aria-live="polite"></div>
                <output class="calculator-display" id="display">0</output>
            </div>
            
            <div class="calculator-keypad">
 
            </div>

            <div class="last-calc-container">
                <p>Última operación: <span id="last-calc-text">Ninguna</span></p>
            </div>
        </section>
   </main>
    
    <script src="script.js"></script>
</body>
</html>
